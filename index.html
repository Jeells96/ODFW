<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODFW Point Tracker & Analyzer</title>
    <!-- SheetJS to read the Excel file -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c5e3b;
            --secondary: #e6a817;
            --bg: #f4f4f9;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1, h2 { color: var(--primary); }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .btn-odfw {
            background-color: var(--secondary);
            color: #000;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            border: 2px solid #c99314;
        }
        .upload-section {
            background-color: #f9f9f9;
            padding: 15px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .mapping-section {
            display: none;
            background-color: #e8f4ec;
            padding: 15px;
            border-left: 5px solid var(--primary);
            margin-top: 15px;
        }
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .form-row > div {
            flex: 1;
            min-width: 150px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--primary);
            color: white;
        }
        .analysis-box {
            background-color: #e8f4ec;
            border-left: 5px solid var(--primary);
            padding: 15px;
            margin-top: 20px;
            display: none;
        }
        .alert-high { color: #d9534f; font-weight: bold; }
        .alert-good { color: #5cb85c; font-weight: bold; }
        .alert-hold { color: #f0ad4e; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Oregon Hunting Unit Analyzer</h1>

    <div class="card">
        <div class="header-actions">
            <h2>1. Extract Data from Spreadsheet</h2>
            <a href="https://odfw.huntfishoregon.com/reportdownloads" target="_blank" class="btn-odfw">
                📥 Get ODFW Reports Here
            </a>
        </div>
        
        <div class="upload-section">
            <label for="excelFile"><strong>Upload your spreadsheet (e.g., 2026 Buck Deer Outfitter Draw Report Public Version_2.xlsx):</strong></label><br>
            <input type="file" id="excelFile" accept=".xlsx, .xls">
            
            <div id="mappingArea" class="mapping-section">
                <h3>Map Your Columns</h3>
                <p>Match the data to the correct columns from your file.</p>
                
                <div class="form-row">
                    <div>
                        <label>Target Hunt Unit:</label>
                        <input type="text" id="targetUnit" placeholder="e.g., 171M">
                    </div>
                    <div>
                        <label>Your Current Points:</label>
                        <input type="number" id="myPoints" placeholder="e.g., 4">
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Column for "Unit/Hunt":</label>
                        <select id="colUnit"></select>
                    </div>
                    <div>
                        <label>Column for "Year":</label>
                        <select id="colYear"></select>
                    </div>
                    <div>
                        <label>Column for "Min Points Required":</label>
                        <select id="colPoints"></select>
                    </div>
                </div>
                <button onclick="processData()">Import & Analyze</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>2. Data Trends & Analysis</h2>
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Hunt Unit</th>
                    <th>Min Points Required</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="analysisResult" class="analysis-box"></div>
    </div>

    <script>
        let rawExcelData = [];
        let huntData = [];

        // 1. Read the Excel File
        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // Convert to JSON
                rawExcelData = XLSX.utils.sheet_to_json(worksheet, {defval: ""});
                
                if (rawExcelData.length > 0) {
                    populateDropdowns(Object.keys(rawExcelData[0]));
                    document.getElementById('mappingArea').style.display = 'block';
                } else {
                    alert("The spreadsheet appears to be empty.");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // 2. Populate Dropdowns with Excel Headers
        function populateDropdowns(headers) {
            const selects = ['colUnit', 'colYear', 'colPoints'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = headers.map(h => `<option value="${h}">${h}</option>`).join('');
            });
        }

        // 3. Process the Data based on User Selection
        function processData() {
            const targetUnit = document.getElementById('targetUnit').value.trim();
            const myPoints = parseFloat(document.getElementById('myPoints').value);
            const colUnit = document.getElementById('colUnit').value;
            const colYear = document.getElementById('colYear').value;
            const colPoints = document.getElementById('colPoints').value;

            if (!targetUnit || isNaN(myPoints)) {
                alert("Please enter your Target Hunt Unit and Current Points.");
                return;
            }

            // Filter raw data for the target unit
            huntData = rawExcelData
                .filter(row => String(row[colUnit]).trim().toLowerCase() === targetUnit.toLowerCase())
                .map(row => ({
                    year: parseInt(row[colYear]) || 2026, // Fallback if year isn't present
                    unit: row[colUnit],
                    req: parseFloat(row[colPoints]) || 0
                }))
                .filter(d => !isNaN(d.req)); // Remove rows without valid point data

            // Sort chronologically
            huntData.sort((a, b) => a.year - b.year);

            updateTable();
            analyzeTrends(myPoints);
        }

        // 4. Show Data in Table
        function updateTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            huntData.forEach(data => {
                tbody.innerHTML += `<tr><td>${data.year}</td><td>${data.unit}</td><td>${data.req}</td></tr>`;
            });
        }

        // 5. Analyze and Output
        function analyzeTrends(myPoints) {
            const analysisDiv = document.getElementById('analysisResult');
            analysisDiv.style.display = 'block';
            
            if (huntData.length < 2) {
                analysisDiv.innerHTML = "<h3>Analysis:</h3><p><em>Not enough historical data found for this unit to calculate trends. Make sure the spreadsheet has multiple years of data, or input manually.</em></p>";
                return;
            }

            let totalCreep = 0;
            for (let i = 1; i < huntData.length; i++) {
                let yearDiff = huntData[i].year - huntData[i-1].year || 1; // Prevent division by zero
                let pointDiff = huntData[i].req - huntData[i-1].req;
                totalCreep += (pointDiff / yearDiff); 
            }
            let avgCreep = totalCreep / (huntData.length - 1);
            
            let latestData = huntData[huntData.length - 1];
            let projectedPointsNeeded = latestData.req + avgCreep;

            let trendText = "";
            if (avgCreep > 0.25) { trendText = `<span class="alert-high">Severe Point Creep (+${avgCreep.toFixed(2)} pts/year).</span>`; } 
            else if (avgCreep > 0) { trendText = `Moderate Point Creep (+${avgCreep.toFixed(2)} pts/year).`; } 
            else if (avgCreep < 0) { trendText = `<span class="alert-good">Favorable Trend (${avgCreep.toFixed(2)} pts/year).</span>`; } 
            else { trendText = `Stable (0 pts/year).`; }

            let recommendation = "";
            if (myPoints >= Math.ceil(projectedPointsNeeded)) {
                recommendation = `<span class="alert-good">✅ Apply for the Tag!</span> You have ${myPoints} points, and the projected requirement is roughly ${projectedPointsNeeded.toFixed(1)}.`;
            } else if (myPoints >= latestData.req && avgCreep > 0) {
                recommendation = `<span class="alert-hold">⚠️ Toss-Up.</span> You met last year's requirement, but might fall short due to point creep.`;
            } else {
                let yearsOut = Math.ceil((projectedPointsNeeded - myPoints) / (1 - avgCreep));
                if (yearsOut < 0 || avgCreep >= 1) {
                    recommendation = `<span class="alert-high">❌ Point Creep outpaces your earning potential.</span> Consider a different unit.`;
                } else {
                    recommendation = `<span class="alert-high">⏳ Keep Buying Point Savers.</span> You are roughly ${yearsOut} year(s) away from drawing.`;
                }
            }

            analysisDiv.innerHTML = `
                <h3>Strategy & Analysis:</h3>
                <p><strong>Historical Trend:</strong> ${trendText}</p>
                <p><strong>Projected Requirement Next Year:</strong> ~${projectedPointsNeeded.toFixed(1)} points.</p>
                <p><strong>What to do with your points:</strong> ${recommendation}</p>
            `;
        }
    </script>
</body>
</html>
