<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODFW Point Tracker & Analyzer</title>
    <style>
        :root {
            --primary: #2c5e3b; /* Forest Green */
            --secondary: #e6a817; /* ODFW Gold */
            --bg: #f4f4f9;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1, h2 {
            color: var(--primary);
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .btn-odfw {
            background-color: var(--secondary);
            color: #000;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            border: 2px solid #c99314;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .btn-odfw:hover {
            background-color: #ffd15c;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .form-row > div {
            flex: 1;
            min-width: 150px;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
        }
        button:hover {
            background-color: #1f4229;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--primary);
            color: white;
        }
        .analysis-box {
            background-color: #e8f4ec;
            border-left: 5px solid var(--primary);
            padding: 15px;
            margin-top: 20px;
        }
        .alert-high { color: #d9534f; font-weight: bold; }
        .alert-good { color: #5cb85c; font-weight: bold; }
        .alert-hold { color: #f0ad4e; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Oregon Hunting Unit Analyzer</h1>

    <div class="card">
        <div class="header-actions">
            <h2>1. Input Historical Data</h2>
            <a href="https://odfw.huntfishoregon.com/reportdownloads" target="_blank" class="btn-odfw">
                📥 Get ODFW Reports Here
            </a>
        </div>
        
        <p><em>Check the ODFW reports and enter the minimum points required to guarantee a tag for your desired unit over the past few years.</em></p>

        <div class="form-row">
            <div class="form-group">
                <label for="myPoints">Your Current Points:</label>
                <input type="number" id="myPoints" placeholder="e.g., 4" min="0">
            </div>
            <div class="form-group">
                <label for="year">Hunt Year:</label>
                <input type="number" id="year" placeholder="e.g., 2023">
            </div>
            <div class="form-group">
                <label for="pointsReq">Min Points to Draw:</label>
                <input type="number" id="pointsReq" placeholder="e.g., 3" step="0.1">
            </div>
        </div>
        <button onclick="addData()">Add Year Data</button>
    </div>

    <div class="card">
        <h2>2. Data Trends & Analysis</h2>
        
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Min Points Required</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data goes here -->
            </tbody>
        </table>

        <div id="analysisResult" class="analysis-box" style="display:none;">
            <!-- Analysis output goes here -->
        </div>
    </div>

    <script>
        let huntData = [];

        function addData() {
            const yearInput = document.getElementById('year').value;
            const pointsReqInput = document.getElementById('pointsReq').value;
            const myPointsInput = document.getElementById('myPoints').value;

            if (!yearInput || !pointsReqInput || !myPointsInput) {
                alert("Please fill in your current points, the year, and the required points to draw.");
                return;
            }

            // Check if year already exists to avoid duplicates
            const existingIndex = huntData.findIndex(d => d.year === parseInt(yearInput));
            if (existingIndex > -1) {
                huntData[existingIndex].req = parseFloat(pointsReqInput);
            } else {
                huntData.push({
                    year: parseInt(yearInput),
                    req: parseFloat(pointsReqInput)
                });
            }

            // Sort data chronologically
            huntData.sort((a, b) => a.year - b.year);

            // Clear inputs for next entry
            document.getElementById('year').value = '';
            document.getElementById('pointsReq').value = '';

            updateTable();
            analyzeTrends(parseFloat(myPointsInput));
        }

        function deleteData(year) {
            huntData = huntData.filter(d => d.year !== year);
            const myPointsInput = parseFloat(document.getElementById('myPoints').value) || 0;
            updateTable();
            analyzeTrends(myPointsInput);
        }

        function updateTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            huntData.forEach(data => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${data.year}</td>
                    <td>${data.req}</td>
                    <td><button onclick="deleteData(${data.year})" style="background-color:#d9534f; padding:5px 10px;">Remove</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function analyzeTrends(myPoints) {
            const analysisDiv = document.getElementById('analysisResult');
            
            if (huntData.length < 2) {
                analysisDiv.style.display = 'block';
                analysisDiv.innerHTML = "<h3>Analysis:</h3><p><em>Add at least 2 years of data to see point creep trends. The more years you add, the more accurate the prediction!</em></p>";
                return;
            }

            analysisDiv.style.display = 'block';

            // Calculate "Point Creep" (Average change per year)
            let totalCreep = 0;
            for (let i = 1; i < huntData.length; i++) {
                let yearDiff = huntData[i].year - huntData[i-1].year;
                let pointDiff = huntData[i].req - huntData[i-1].req;
                // Normalize creep per year in case years were skipped
                totalCreep += (pointDiff / yearDiff); 
            }
            let avgCreep = totalCreep / (huntData.length - 1);
            
            let latestData = huntData[huntData.length - 1];
            let projectedPointsNeeded = latestData.req + avgCreep;

            let trendText = "";
            if (avgCreep > 0.25) {
                trendText = `<span class="alert-high">Severe Point Creep (+${avgCreep.toFixed(2)} pts/year).</span> The bar is rising fast.`;
            } else if (avgCreep > 0) {
                trendText = `Moderate Point Creep (+${avgCreep.toFixed(2)} pts/year). Points required are slowly increasing.`;
            } else if (avgCreep < 0) {
                trendText = `<span class="alert-good">Favorable Trend (${avgCreep.toFixed(2)} pts/year).</span> The points required are actually dropping!`;
            } else {
                trendText = `Stable. The points required have not changed.`;
            }

            // Recommendation Logic
            let recommendation = "";
            if (myPoints >= Math.ceil(projectedPointsNeeded)) {
                recommendation = `<span class="alert-good">✅ Apply for the Tag!</span> You have ${myPoints} points, and the projected requirement for next year is roughly ${projectedPointsNeeded.toFixed(1)}. You have a very high statistical chance of drawing.`;
            } else if (myPoints >= latestData.req && avgCreep > 0) {
                recommendation = `<span class="alert-hold">⚠️ Toss-Up.</span> You met last year's requirement, but due to point creep, you might fall just short this year. It is worth applying, but have a backup plan.`;
            } else {
                let yearsOut = Math.ceil((projectedPointsNeeded - myPoints) / (1 - avgCreep)); // Assuming you gain 1 pt a year
                if (yearsOut < 0 || avgCreep >= 1) {
                    recommendation = `<span class="alert-high">❌ Point Creep outpaces your earning potential.</span> You may never draw this tag unless trends reverse. Consider a different unit.`;
                } else {
                    recommendation = `<span class="alert-high">⏳ Keep Buying Point Savers.</span> You are roughly ${yearsOut} year(s) away from safely drawing this tag.`;
                }
            }

            analysisDiv.innerHTML = `
                <h3>Strategy & Analysis:</h3>
                <p><strong>Historical Trend:</strong> ${trendText}</p>
                <p><strong>Projected Requirement Next Year:</strong> ~${projectedPointsNeeded.toFixed(1)} points.</p>
                <p><strong>What to do with your points:</strong> ${recommendation}</p>
            `;
        }
    </script>
</body>
</html>
