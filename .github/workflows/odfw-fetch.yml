name: ODFW Data Auto-Update

on:
  schedule:
    # 1st of every month, 9:15 AM Pacific (16:15 UTC). Draw reports post each
    # fall; harvest results each spring. Monthly checks catch both.
    - cron: '15 16 1 * *'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm install xlsx@0.18.5 pdfjs-dist@3.11.174 --no-save
          pip install pdfplumber --quiet

      - name: Fetch ODFW reports and sync to Firebase
        run: node scripts/fetch-odfw.mjs
